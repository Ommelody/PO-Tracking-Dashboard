<html>
<head>
<meta charset="utf-8">

</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="po-data.js"></script>
<script src="xlsx-parse.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#eef1f2;font-family:'IBM Plex Sans Thai',system-ui,sans-serif;color:#16242b;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#c2cdcf;border-radius:6px;border:2px solid #eef1f2}
  ::-webkit-scrollbar-track{background:transparent}
  select,input{font-family:inherit}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes overlayIn{from{opacity:0}to{opacity:1}}
  @keyframes sheetIn{from{opacity:0;transform:translateY(18px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
</style>

      <rect x="360" y="430" width="150" height="120" rx="14"/>
      <rect x="525" y="430" width="150" height="120" rx="14"/>
      <rect x="690" y="430" width="150" height="120" rx="14"/>

    <g fill="#ffffff">
      <rect x="380" y="470" width="70" height="40" rx="6"/>

</helmet>
<div id="root" style="min-height:100vh">{{ app }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1340,&quot;height&quot;:1700}}">
class Component extends DCLogic {
  state = {
    ready:false, tab:'all',
    f:{ q:'', prefix:'', vendor:'', wh:'', dept:'', person:'', from:'', to:'' },
    sortKey:'urgent', sortDir:1, page:0, perPage:25, sel:null,
    upOpen:false, up:{ po:null, gr:null, busy:false, err:'', stage:'', note:'' }, toast:'',
    cloud:{ state:'init' }
  };

  componentDidMount(){
    const t=()=>{ if(window.PODATA){ this.D=window.PODATA; this.setState({ready:true}); this.syncFromCloud(); } else setTimeout(t,60); };
    t();
  }

  async syncFromCloud(){
    let tries=0;
    while((!window.FBStore || !window.firebase) && tries<50){ await new Promise(r=>setTimeout(r,100)); tries++; }
    if(!window.FBStore){ this.setState({cloud:{state:'offline'}}); return; }
    if(!window.FBStore.isConfigured()){ this.setState({cloud:{state:'unconfigured'}}); return; }
    this.setState({cloud:{state:'loading'}});
    try{
      const res=await window.FBStore.loadCurrent();
      if(res && res.data && res.data.rows && res.data.rows.length){
        this.D=res.data; window.PODATA=res.data; this._opt=null;
        this.setState({cloud:{state:'connected',meta:res.meta}});
      } else {
        this.setState({cloud:{state:'connected',meta:null}});
      }
    }catch(e){ this.setState({cloud:{state:'error',err:e.message||String(e)}}); }
  }

  cloudBadge(){
    const h=React.createElement; const c=this.state.cloud||{state:'init'};
    const map={
      init:{t:'กำลังเริ่มระบบ…',col:this.MUTE,bg:'#eef2f2',dot:'#b6c2c4'},
      offline:{t:'โหมดออฟไลน์',col:this.MUTE,bg:'#eef2f2',dot:'#b6c2c4'},
      unconfigured:{t:'ยังไม่เชื่อม Firebase',col:this.TRACK.await.c,bg:this.TRACK.await.bg,dot:this.TRACK.await.c},
      loading:{t:'กำลังซิงค์ข้อมูล…',col:this.TEAL,bg:'#e3f1f2',dot:this.TEAL},
      connected:{t:'เชื่อมฐานข้อมูลกลาง',col:this.TRACK.full.c,bg:this.TRACK.full.bg,dot:this.TRACK.full.c},
      error:{t:'เชื่อม Firebase ไม่สำเร็จ',col:this.RED,bg:this.REDBG,dot:this.RED}
    };
    const m=map[c.state]||map.init; const meta=c.meta;
    let when=null; if(meta&&meta.updatedAtClient){ try{ when=new Date(meta.updatedAtClient).toLocaleString('th-TH',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(e){} }
    return h('div',{style:{display:'flex',alignItems:'center',gap:7}},
      h('div',{style:{display:'inline-flex',alignItems:'center',gap:7,padding:'5px 11px',borderRadius:20,background:m.bg,color:m.col,fontSize:11.5,fontWeight:600}},
        c.state==='loading'? h('span',{style:{width:11,height:11,borderRadius:'50%',border:'2px solid '+this.TEAL,borderTopColor:'transparent',animation:'spin .8s linear infinite'}}) : h('span',{style:{width:7,height:7,borderRadius:'50%',background:m.dot}}),
        m.t,
        when? h('span',{style:{fontWeight:400,opacity:.85}},'· '+when):null,
        meta&&meta.note? h('span',{style:{fontWeight:400,opacity:.85}},'· '+meta.note):null),
      (c.state==='connected'||c.state==='error')? h('button',{onClick:()=>this.syncFromCloud(),title:'รีเฟรชจากฐานข้อมูล',
        style:{border:'1px solid '+this.LINE,background:'#fff',borderRadius:8,width:27,height:27,cursor:'pointer',color:this.MUTE,fontSize:13,lineHeight:1}},'⟳'):null
    );
  }

  // ---------- format helpers ----------
  fmtN(n){ return Math.round(n||0).toLocaleString('en-US'); }
  fmtM(n){ n=n||0; if(Math.abs(n)>=1e6) return (n/1e6).toFixed(1); if(Math.abs(n)>=1e3) return (n/1e3).toFixed(0)+'K'; return this.fmtN(n); }
  baht(n){ return '฿'+this.fmtN(n); }
  dnum(s){ if(!s) return 0; const p=String(s).split('.'); if(p.length!==3) return 0; const[d,m,y]=p.map(Number); return (2000+y)*10000+m*100+d; }
  fdate(s){ if(!s) return '—'; const p=String(s).split('.'); if(p.length!==3) return s; return p[0]+'/'+p[1]+'/'+(2000+Number(p[2])); }
  inpNum(s){ return s? Number(s.replace(/-/g,'')) : 0; }

  TRACK = {
    full:{label:'รับครบแล้ว', c:'#2f8f6b', bg:'#e6f4ee'},
    partial:{label:'รับบางส่วน', c:'#2273b0', bg:'#e4f0f8'},
    await:{label:'รอรับของ', c:'#b8810f', bg:'#fbf1da'}
  };
  RED='#c5483b'; REDBG='#fbe9e7';
  TEAL='#0f7c80'; INK='#16242b'; MUTE='#64777d'; LINE='#e2e8ea'; PANEL='#f7f9f9';

  // ---------- filtering ----------
  setTab(t){ this.setState({tab:t,page:0}); }
  setSort(k){ this.setState(s=>({ sortKey:k, sortDir: s.sortKey===k? -s.sortDir : 1, page:0 })); }
  setF(key,val){ this.setState(s=>({ f:Object.assign({},s.f,{[key]:val}), page:0 })); }
  toggleF(key,val){ this.setState(s=>({ f:Object.assign({},s.f,{[key]: s.f[key]===val?'':val}), page:0 })); }
  clearF(){ this.setState({ f:{q:'',prefix:'',vendor:'',wh:'',dept:'',person:'',from:'',to:''}, tab:'all', page:0 }); }
  activeCount(){ const f=this.state.f; return ['prefix','vendor','wh','dept','person','from','to','q'].filter(k=>f[k]).length; }

  // rows passing scope filters, optionally ignoring one key (for breakdown navigation)
  scoped(except){
    const f=this.state.f; const fromN=this.inpNum(f.from), toN=this.inpNum(f.to);
    const qq=f.q.trim().toLowerCase();
    return this.D.rows.filter(r=>{
      if(except!=='prefix' && f.prefix && r.pf!==f.prefix) return false;
      if(except!=='vendor' && f.vendor && r.vn!==f.vendor) return false;
      if(except!=='wh' && f.wh && r.wh!==f.wh) return false;
      if(except!=='dept' && f.dept && r.dept!==f.dept) return false;
      if(except!=='person' && f.person && r.pn!==f.person) return false;
      if(fromN||toN){ const d=this.dnum(r.post); if(!d) return false; if(fromN&&d<fromN) return false; if(toN&&d>toN) return false; }
      if(qq){
        const hay=(r.doc+' '+r.pf+' '+r.vn+' '+r.vc+' '+r.dept+' '+r.wh+' '+r.pn+' '+r.rm).toLowerCase();
        if(!hay.includes(qq)){ if(!(r.items||[]).some(it=>(it.desc+' '+it.no).toLowerCase().includes(qq))) return false; }
      }
      return true;
    });
  }

  derive(rows){
    let full=0,partial=0,aw=0,overdue=0,valAwait=0,totalValue=0;
    const pm={};
    for(const r of rows){
      if(r.tr==='full') full++; else if(r.tr==='partial') partial++; else aw++;
      if(r.od) overdue++;
      totalValue+=r.val;
      if(r.tr!=='full') valAwait += r.qty>0? r.val*(r.oq/r.qty):0;
      const k=this.ymOf(r.post); if(k) pm[k]=(pm[k]||0)+1;
    }
    return { totalPO:rows.length, totalValue, track:{full,partial,await:aw}, overdue, valAwait, poByMonth:pm };
  }
  ymOf(s){ if(!s) return null; const p=String(s).split('.'); if(p.length!==3) return null; return (2000+Number(p[2]))+'-'+p[1]; }

  breakdown(key, except, n){
    const rows=this.scoped(except); const m={};
    for(const r of rows){ const v=(key==='pf'?r.pf:key==='vn'?r.vn:key==='pn'?r.pn:r[key])||'(ไม่ระบุ)';
      const e=m[v]||(m[v]={k:v,count:0,open:0,val:0}); e.count++; e.val+=r.val; if(r.tr!=='full') e.open++; }
    return Object.values(m).sort((a,b)=>b.count-a.count).slice(0,n||999);
  }

  options(key){ // distinct values across full dataset, sorted by frequency
    if(!this._opt) this._opt={};
    if(this._opt[key]) return this._opt[key];
    const m={};
    for(const r of this.D.rows){ const v=(key==='pf'?r.pf:key==='vn'?r.vn:key==='pn'?r.pn:r[key]); if(v) m[v]=(m[v]||0)+1; }
    const arr=Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([k])=>k);
    this._opt[key]=arr; return arr;
  }

  // ---------- root ----------
  renderVals(){
    if(!this.state.ready) return { app:this.loading() };
    const h=React.createElement;
    const scope=this.scoped();
    const M=this.derive(scope);
    return { app: h('div',{style:{maxWidth:1340,margin:'0 auto',padding:'0 28px 64px'}},
      this.header(),
      this.filterBar(scope.length),
      this.kpis(M),
      this.pipeline(),
      this.charts(M),
      this.prefixSection(),
      this.peopleVendor(),
      this.tableSection(scope),
      this.state.sel!=null ? this.modal() : null,
      this.state.upOpen ? this.uploadModal() : null,
      this.state.toast ? this.toastEl() : null
    )};
  }

  loading(){
    const h=React.createElement;
    return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:18,color:this.MUTE}},
      h('div',{style:{width:38,height:38,borderRadius:'50%',border:'3px solid #d4dee0',borderTopColor:this.TEAL,animation:'spin .8s linear infinite'}}),
      h('div',{style:{fontSize:14}},'กำลังโหลดข้อมูลใบสั่งซื้อ…')
    );
  }
  card(children,extra){ return React.createElement('div',{style:Object.assign({background:'#fff',border:'1px solid '+this.LINE,borderRadius:14,boxShadow:'0 1px 2px rgba(20,40,50,.04)'},extra||{})}, children); }
  secTitle(t,right){ return React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
    React.createElement('div',{style:{fontSize:11.5,fontWeight:600,letterSpacing:1,color:this.MUTE,textTransform:'uppercase'}},t), right||null); }

  header(){
    const h=React.createElement; const s=this.D.summary;
    return h('div',{style:{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:24,flexWrap:'wrap',padding:'30px 0 18px'}},
      h('div',null,
        h('div',{style:{display:'flex',alignItems:'center',gap:11,marginBottom:8}},
          h('div',{style:{width:34,height:34,borderRadius:9,background:this.TEAL,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:17,fontFamily:"'IBM Plex Mono',monospace"}},'PO'),
          h('div',{style:{fontSize:12,fontWeight:600,letterSpacing:1.5,color:this.TEAL,textTransform:'uppercase'}},'Purchase Order Tracking')
        ),
        h('h1',{style:{margin:0,fontSize:27,fontWeight:700,letterSpacing:-.3,lineHeight:1.15}},'ระบบติดตามสถานะใบสั่งซื้อ'),
        h('div',{style:{marginTop:6,fontSize:13.5,color:this.MUTE}},'โรงพยาบาลธรรมศาสตร์เฉลิมพระเกียรติ · SAP Business One · เชื่อม PO ↔ Goods Receipt')
      ),
      h('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:10}},
        h('button',{onClick:()=>this.setState({upOpen:true}),
          style:{display:'flex',alignItems:'center',gap:8,padding:'9px 16px',background:this.TEAL,color:'#fff',border:'none',borderRadius:10,fontSize:13,fontWeight:600,cursor:'pointer',boxShadow:'0 1px 2px rgba(15,124,128,.3)'}},
          h('span',{style:{fontSize:15}},'↑'),'อัปโหลดข้อมูล PO / GR'),
        this.cloudBadge(),
        h('div',{style:{textAlign:'right',fontSize:12,color:this.MUTE,lineHeight:1.6}},
          h('div',null,'ช่วงข้อมูล ',h('b',{style:{color:this.INK,fontFamily:"'IBM Plex Mono',monospace"}},s.dateMin),' – ',h('b',{style:{color:this.INK,fontFamily:"'IBM Plex Mono',monospace"}},s.dateMax)),
          h('div',null,'ปรับปรุง ',h('b',{style:{color:this.INK,fontFamily:"'IBM Plex Mono',monospace"}},s.generated))
        )
      )
    );
  }

  // ---------- filter bar ----------
  ctrl(label,node){
    return React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:4}},
      React.createElement('div',{style:{fontSize:10.5,fontWeight:600,color:this.MUTE,textTransform:'uppercase',letterSpacing:.4}},label), node);
  }
  select(key,opts,wide){
    const h=React.createElement; const v=this.state.f[key];
    return h('select',{value:v,onChange:e=>this.setF(key,e.target.value),
      style:{padding:'7px 9px',border:'1px solid '+(v?this.TEAL:this.LINE),borderRadius:8,fontSize:12.5,color:v?this.INK:this.MUTE,background:v?'#f0f8f8':'#fff',minWidth:wide?180:120,maxWidth:wide?230:170,cursor:'pointer',outline:'none'}},
      [h('option',{key:'',value:''},'ทั้งหมด'), ...opts.map(o=>h('option',{key:o,value:o}, o.length>34?o.slice(0,33)+'…':o))]
    );
  }
  dateInput(key){
    const h=React.createElement; const v=this.state.f[key];
    return h('input',{type:'date',value:v,onChange:e=>this.setF(key,e.target.value),
      style:{padding:'6px 9px',border:'1px solid '+(v?this.TEAL:this.LINE),borderRadius:8,fontSize:12.5,color:this.INK,background:v?'#f0f8f8':'#fff',outline:'none'}});
  }
  filterBar(count){
    const h=React.createElement; const f=this.state.f; const active=this.activeCount();
    return this.card(h('div',{style:{padding:'14px 16px'}},
      h('div',{style:{display:'flex',alignItems:'flex-end',gap:12,flexWrap:'wrap'}},
        h('div',{style:{position:'relative',display:'flex',flexDirection:'column',gap:4}},
          h('div',{style:{fontSize:10.5,fontWeight:600,color:this.MUTE,textTransform:'uppercase',letterSpacing:.4}},'ค้นหา'),
          h('div',{style:{position:'relative'}},
            h('input',{value:f.q,onChange:e=>this.setF('q',e.target.value),placeholder:'PO / ผู้ขาย / สินค้า / หมายเหตุ',
              style:{width:230,padding:'7px 11px 7px 28px',border:'1px solid '+(f.q?this.TEAL:this.LINE),borderRadius:8,fontSize:12.5,outline:'none',color:this.INK,background:f.q?'#f0f8f8':'#fff'}}),
            h('div',{style:{position:'absolute',left:9,top:7,color:this.MUTE,fontSize:13}},'⌕'))
        ),
        this.ctrl('ชุดเอกสาร (Prefix)', this.select('prefix',this.options('pf'))),
        this.ctrl('ผู้ขาย', this.select('vendor',this.options('vn'),true)),
        this.ctrl('คลัง', this.select('wh',this.options('wh'))),
        this.ctrl('แผนก', this.select('dept',this.options('dept'))),
        this.ctrl('ผู้รับผิดชอบ', this.select('person',this.options('pn'),true)),
        this.ctrl('วันที่เอกสารตั้งแต่', this.dateInput('from')),
        this.ctrl('ถึง', this.dateInput('to')),
        h('div',{style:{flex:1}}),
        h('div',{style:{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end'}},
          h('div',{style:{fontSize:11,color:this.MUTE}}, active? h('span',null,h('b',{style:{color:this.TEAL}},active),' ตัวกรอง · ') : null, 'พบ ',h('b',{style:{color:this.INK,fontFamily:"'IBM Plex Mono',monospace"}},this.fmtN(count)),' ใบ'),
          active? h('button',{onClick:()=>this.clearF(),style:{padding:'6px 12px',border:'1px solid '+this.LINE,background:'#fff',borderRadius:8,fontSize:12,color:this.RED,cursor:'pointer',fontWeight:500}},'✕ ล้างตัวกรอง') : h('div',{style:{height:30}})
        )
      )
    ),{marginBottom:14});
  }

  kpis(M){
    const h=React.createElement; const s=this.D.summary;
    const items=[
      {k:'all',label:'ใบสั่งซื้อ (ในมุมมอง)',val:this.fmtN(M.totalPO),unit:'ใบ',sub:'จากทั้งหมด '+this.fmtN(s.totalPO)+' ใบ',c:this.INK,accent:this.TEAL},
      {k:'await',label:'รอรับของ',val:this.fmtN(M.track.await),unit:'ใบ',sub:'ยังไม่มีการรับเข้า',c:this.TRACK.await.c,accent:this.TRACK.await.c},
      {k:'partial',label:'รับของบางส่วน',val:this.fmtN(M.track.partial),unit:'ใบ',sub:'รับแล้วบางรายการ',c:this.TRACK.partial.c,accent:this.TRACK.partial.c},
      {k:'overdue',label:'เกินกำหนดส่ง',val:this.fmtN(M.overdue),unit:'ใบ',sub:'เลยวันที่กำหนดส่ง',c:this.RED,accent:this.RED},
      {k:null,label:'มูลค่าค้างรับของ',val:'฿'+this.fmtM(M.valAwait),unit:M.valAwait>=1e6?'ล้านบาท':'บาท',sub:'ประเมินจากจำนวนค้างรับ',c:this.TRACK.await.c,accent:this.TRACK.await.c},
      {k:null,label:'มูลค่าจัดซื้อรวม',val:'฿'+this.fmtM(M.totalValue),unit:M.totalValue>=1e6?'ล้านบาท':'บาท',sub:this.fmtN(M.track.full)+' ใบ รับครบแล้ว',c:this.INK,accent:this.TRACK.full.c}
    ];
    return h('div',{style:{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:14,marginBottom:14}},
      items.map((it,i)=> h('div',{key:i,onClick:it.k?()=>this.setTab(it.k):undefined,
        style:{cursor:it.k?'pointer':'default',background:'#fff',border:'1px solid '+(this.state.tab===it.k&&it.k?it.accent:this.LINE),borderRadius:14,padding:'16px 16px 15px',position:'relative',overflow:'hidden',boxShadow:'0 1px 2px rgba(20,40,50,.04)'}},
        h('div',{style:{position:'absolute',left:0,top:0,bottom:0,width:3,background:it.accent}}),
        h('div',{style:{fontSize:12,color:this.MUTE,fontWeight:500,marginBottom:9,minHeight:32}},it.label),
        h('div',{style:{display:'flex',alignItems:'baseline',gap:5}},
          h('div',{style:{fontSize:25,fontWeight:700,color:it.c,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:-.5}},it.val),
          h('div',{style:{fontSize:11.5,color:this.MUTE}},it.unit)),
        h('div',{style:{fontSize:11,color:this.MUTE,marginTop:7,lineHeight:1.3}},it.sub)
      ))
    );
  }

  pipeline(){
    const h=React.createElement; const s=this.D.summary;
    const stage=(badge,title,big,unit,sub,c)=> h('div',{style:{flex:1,padding:'4px 2px'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:8}},
        h('div',{style:{width:22,height:22,borderRadius:6,background:c,color:'#fff',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'IBM Plex Mono',monospace"}},badge),
        h('div',{style:{fontSize:13,fontWeight:600}},title)),
      h('div',{style:{display:'flex',alignItems:'baseline',gap:6}},
        h('div',{style:{fontSize:22,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:this.INK}},big),

      h('div',{onClick:e=>e.stopPropagation(),style:{background:'#fff',borderRadius:16,width:'100%',maxWidth:760,boxShadow:'0 24px 60px rgba(10,25,30,.28)',animation:'sheetIn .22s cubic-bezier(.2,.7,.3,1)',overflow:'hidden'}},
        h('div',{style:{padding:'20px 24px',borderBottom:'1px solid '+this.LINE,display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:16}},

          h('div',{style:{display:'flex',flexWrap:'wrap',gap:8}}, r.grl.map((g,i)=>
            h('div',{key:i,style:{display:'flex',alignItems:'center',gap:8,padding:'6px 11px',borderRadius:8,background:this.TRACK.full.bg,fontSize:12}},
              h('span',{style:{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,color:this.TRACK.full.c}},g.d),

  // ---------- upload ----------
  pickFile(which,file){ this.setState(s=>({ up:Object.assign({},s.up,{[which]:file,err:''}) })); }
  async runUpload(){
    const {po,gr}=this.state.up;
    if(!po||!gr){ this.setState(s=>({up:Object.assign({},s.up,{err:'กรุณาเลือกทั้งไฟล์ PO และไฟล์ GR'})})); return; }
    this.setState(s=>({up:Object.assign({},s.up,{busy:true,err:'',stage:'กำลังอ่านไฟล์…'})}));
    try{
      if(!window.XLSXTrack) throw new Error('ตัวประมวลผลยังไม่พร้อม กรุณาลองใหม่');
      this.setState(s=>({up:Object.assign({},s.up,{stage:'กำลังแยกข้อมูลและจับคู่ PO ↔ GR…'})}));
      await new Promise(r=>setTimeout(r,30));
      const ds=await window.XLSXTrack.fromFiles(po,gr);
      if(!ds.rows.length) throw new Error('ไม่พบรายการใบสั่งซื้อในไฟล์');
      this.D=ds; window.PODATA=ds; this._opt=null;
      let toast='ประมวลผลสำเร็จ · '+this.fmtN(ds.summary.totalPO)+' ใบสั่งซื้อ (เฉพาะเครื่องนี้)';
      let cloud=this.state.cloud;
      if(window.FBStore && window.FBStore.init()){
        this.setState(s=>({up:Object.assign({},s.up,{stage:'กำลังบันทึกขึ้นฐานข้อมูลกลาง (Firebase)…'})}));
        await new Promise(r=>setTimeout(r,30));
        try{
          const meta=await window.FBStore.saveCurrent(ds, this.state.up.note||'');
          cloud={state:'connected',meta}; toast='บันทึกขึ้นฐานข้อมูลกลางแล้ว · ทุกคนจะเห็นข้อมูลนี้';
        }catch(e){
          this.setState(s=>({up:Object.assign({},s.up,{busy:false,stage:'',err:'ประมวลผลสำเร็จ แต่บันทึกขึ้น Firebase ไม่สำเร็จ: '+(e.message||e)})}));
          return;
        }
      }
      this.setState({ upOpen:false, up:{po:null,gr:null,busy:false,err:'',stage:'',note:''}, cloud,
        f:{q:'',prefix:'',vendor:'',wh:'',dept:'',person:'',from:'',to:''}, tab:'all', page:0, sel:null, toast });
      clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:''}),4500);
    }catch(e){
      this.setState(s=>({up:Object.assign({},s.up,{busy:false,stage:'',err:'เกิดข้อผิดพลาด: '+(e.message||e)})}));
    }
  }

      h('input',{type:'file',accept:'.xlsx',style:{display:'none'},onChange:e=>{ const f=e.target.files[0]; if(f) this.pickFile(which,f); }}),
      h('div',{style:{border:'1.5px dashed '+(file?this.TEAL:'#cfd9da'),borderRadius:12,padding:'22px 16px',textAlign:'center',background:file?'#f0f8f8':'#fafbfb',transition:'all .15s'}},
        h('div',{style:{width:38,height:38,margin:'0 auto 10px',borderRadius:10,background:file?this.TEAL:'#e7edee',color:file?'#fff':this.MUTE,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:700}}, file?'✓':'↑'),
        h('div',{style:{fontSize:13,fontWeight:600,color:this.INK,marginBottom:3}},label),
        file? h('div',{style:{fontSize:11.5,color:this.TEAL,fontFamily:"'IBM Plex Mono',monospace",wordBreak:'break-all'}},file.name)
            : h('div',{style:{fontSize:11.5,color:this.MUTE}},hint)));
  }

      h('div',{onClick:e=>e.stopPropagation(),style:{background:'#fff',borderRadius:16,width:'100%',maxWidth:600,boxShadow:'0 24px 60px rgba(10,25,30,.28)',animation:'sheetIn .22s cubic-bezier(.2,.7,.3,1)',overflow:'hidden'}},
        h('div',{style:{padding:'20px 24px',borderBottom:'1px solid '+this.LINE,display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
          h('div',null,
            h('div',{style:{fontSize:18,fontWeight:700,marginBottom:4}},'อัปโหลดข้อมูลจาก SAP'),

          h('button',{onClick:close,style:{border:'1px solid '+this.LINE,background:'#fff',width:32,height:32,borderRadius:9,cursor:u.busy?'default':'pointer',fontSize:16,color:this.MUTE}},'✕')),
        h('div',{style:{padding:'20px 24px'}},
          h('div',{style:{display:'flex',gap:14,marginBottom:14}},
            this.dropZone('po','ไฟล์ใบสั่งซื้อ (PO)','คลิกเพื่อเลือก .xlsx'),
            this.dropZone('gr','ไฟล์รับของ (GR)','คลิกเพื่อเลือก .xlsx')),
          h('div',{style:{marginBottom:14}},
            h('div',{style:{fontSize:11,fontWeight:600,color:this.MUTE,marginBottom:5}},'หมายเหตุรอบข้อมูล (ไม่บังคับ)'),
            h('input',{value:u.note||'',onChange:e=>{const v=e.target.value;this.setState(s=>({up:Object.assign({},s.up,{note:v})}));},placeholder:'เช่น ข้อมูล ณ 26 มิ.ย. 2569',
              style:{width:'100%',padding:'8px 11px',border:'1px solid '+this.LINE,borderRadius:9,fontSize:12.5,outline:'none',color:this.INK,background:'#fafbfb'}})),
          h('div',{style:{marginBottom:14,fontSize:11.5,display:'flex',alignItems:'center',gap:8,padding:'9px 12px',borderRadius:9,background:(window.FBStore&&window.FBStore.isConfigured())?this.TRACK.full.bg:this.TRACK.await.bg,color:(window.FBStore&&window.FBStore.isConfigured())?this.TRACK.full.c:this.TRACK.await.c}},
            h('span',{style:{width:7,height:7,borderRadius:'50%',background:'currentColor',flexShrink:0}}),
            (window.FBStore&&window.FBStore.isConfigured())? 'จะบันทึกขึ้นฐานข้อมูลกลาง Firebase — ทุกคนที่เปิดระบบจะเห็นข้อมูลชุดนี้' : 'ยังไม่ได้เชื่อม Firebase — จะประมวลผลเฉพาะเครื่องนี้ (วิธีเชื่อมดูใน README.md)'),
          h('div',{style:{background:this.PANEL,borderRadius:10,padding:'12px 14px',fontSize:11.5,color:this.MUTE,lineHeight:1.7}},
            h('b',{style:{color:this.INK}},'คอลัมน์ที่ระบบใช้: '),'Document Number, Document Status, Prefix String, Posting/Delivery Date, Customer/Vendor, Item, Quantity, Remaining Open Quantity, Gross Total, Warehouse, Department, Base Document Reference, First Name ',h('span',{style:{color:this.TEAL}},'— จับคู่อัตโนมัติตามชื่อหัวคอลัมน์'),' · ระบบประมวลผลในเครื่องของคุณ ไม่อัปโหลดขึ้นเซิร์ฟเวอร์'),
          u.err? h('div',{style:{marginTop:14,padding:'11px 14px',borderRadius:9,background:this.REDBG,color:this.RED,fontSize:12.5}},u.err):null,
          h('div',{style:{marginTop:18,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}},
            h('div',{style:{fontSize:12.5,color:this.MUTE,display:'flex',alignItems:'center',gap:9}},
              u.busy? h('span',{style:{width:16,height:16,borderRadius:'50%',border:'2px solid #d4dee0',borderTopColor:this.TEAL,animation:'spin .8s linear infinite',display:'inline-block'}}):null,
              u.busy? u.stage : ''),
            h('div',{style:{display:'flex',gap:9}},
              h('button',{onClick:close,disabled:u.busy,style:{padding:'9px 16px',border:'1px solid '+this.LINE,background:'#fff',borderRadius:9,fontSize:13,color:this.INK,cursor:u.busy?'default':'pointer'}},'ยกเลิก'),
              h('button',{onClick:()=>this.runUpload(),disabled:u.busy||!u.po||!u.gr,
                style:{padding:'9px 20px',border:'none',borderRadius:9,fontSize:13,fontWeight:600,color:'#fff',background:(u.busy||!u.po||!u.gr)?'#9fc4c5':this.TEAL,cursor:(u.busy||!u.po||!u.gr)?'default':'pointer'}},'ประมวลผลข้อมูล')))
        )));
  }

  toastEl(){
    const h=React.createElement;
    return h('div',{style:{position:'fixed',bottom:26,left:'50%',transform:'translateX(-50%)',zIndex:70,background:this.INK,color:'#fff',padding:'12px 20px',borderRadius:11,fontSize:13,fontWeight:500,boxShadow:'0 10px 30px rgba(10,25,30,.35)',display:'flex',alignItems:'center',gap:9,animation:'fadeUp .25s ease'}},
      h('span',{style:{width:18,height:18,borderRadius:'50%',background:this.TRACK.full.c,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}},'✓'),
