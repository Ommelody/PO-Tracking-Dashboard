  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#eef1f2;font-family:'IBM Plex Sans Thai',system-ui,sans-serif;color:#16242b;-webkit-font-smoothing:antialiased}

  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes overlayIn{from{opacity:0}to{opacity:1}}
  @keyframes sheetIn{from{opacity:0;transform:translateY(18px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
  @media print {
    .no-print { display:none !important; }
    .pr-row { page-break-inside:avoid; }
    thead { display:table-header-group; }
    tr { page-break-inside:avoid; }
    @page { size: A4 landscape; margin: 9mm; }

<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1340,&quot;height&quot;:1800}}">
class Component extends DCLogic {
  state = {
    ready:false, tab:'all', vw:0, filterOpen:false,
    f:{ q:'', prefix:'', vendor:'', wh:'', dept:'', person:'', from:'', to:'' },
    sortKey:'urgent', sortDir:1, page:0, perPage:25, sel:null,
    upOpen:false, up:{ po:null, gr:null, ap:null, busy:false, err:'', stage:'', note:'' }, toast:'',
    cloud:{ state:'init' }, docList:null, printOpen:false
  };

  componentDidMount(){
    this._onResize=()=>{ if(this._raf) return; this._raf=requestAnimationFrame(()=>{ this._raf=null; const w=window.innerWidth; if(w!==this.state.vw) this.setState({vw:w}); }); };
    window.addEventListener('resize',this._onResize);
    const t=()=>{ if(window.PODATA){ this.D=window.PODATA; this.enrich(this.D); this.setState({ready:true,vw:window.innerWidth}); this.syncFromCloud(); } else setTimeout(t,60); };
    t();
  }
  componentWillUnmount(){ if(this._onResize) window.removeEventListener('resize',this._onResize); }

  // recompute overdue + days-overdue against the real current date (keeps the tracker live)
  todayNum(){ const d=new Date(); return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate(); }
  overdueDays(deliv){ const p=String(deliv).split('.'); if(p.length!==3) return 0; const dt=new Date(2000+ +p[2], (+p[1])-1, +p[0]); const td=new Date(); td.setHours(0,0,0,0); return Math.max(0, Math.floor((td-dt)/86400000)); }
  enrich(D){ if(!D||!D.rows) return; const tn=this.todayNum(); for(const r of D.rows){ if(r.tr!=='full' && this.dnum(r.deliv) && this.dnum(r.deliv)<tn){ r.od=1; r.odDays=this.overdueDays(r.deliv); } else { r.od=0; r.odDays=0; } } }
  currentRows(){ const scope=this.scoped(); let rows=scope.filter(r=> this.state.tab==='all'?true : this.state.tab==='overdue'? r.od : r.tr===this.state.tab); return this.sortRows(rows); }
  odBadge(r,big){ return React.createElement('span',{style:{padding:big?'3px 9px':'2px 7px',borderRadius:big?6:5,background:this.REDBG,color:this.RED,fontSize:big?11:10,fontWeight:600,whiteSpace:'nowrap'}}, (big?'เกินกำหนด':'เกิน')+(r.odDays?(' '+r.odDays+' วัน'):(big?'ส่ง':'กำหนด'))); }

  // ---------- format helpers ----------
  fmtN(n){ return Math.round(n||0).toLocaleString('en-US'); }
  fmtM(n){ n=n||0; if(Math.abs(n)>=1e6) return (n/1e6).toFixed(1); if(Math.abs(n)>=1e3) return (n/1e3).toFixed(0)+'K'; return this.fmtN(n); }
  unitM(n){ return Math.abs(n||0)>=1e6?'ล้านบาท':'บาท'; }
  baht(n){ return '฿'+this.fmtN(n); }
  dnum(s){ if(!s) return 0; const p=String(s).split('.'); if(p.length!==3) return 0; const[d,m,y]=p.map(Number); return (2000+y)*10000+m*100+d; }
  fdate(s){ if(!s) return '—'; const p=String(s).split('.'); if(p.length!==3) return s; return p[0]+'/'+p[1]+'/'+(2000+Number(p[2])); }
  inpNum(s){ return s? Number(s.replace(/-/g,'')) : 0; }

  TRACK = {
    full:{label:'รับครบแล้ว', c:'#2f8f6b', bg:'#e6f4ee'},
    partial:{label:'รับบางส่วน', c:'#2273b0', bg:'#e4f0f8'},
    await:{label:'รอรับของ', c:'#b8810f', bg:'#fbf1da'}
  };
  RED='#c5483b'; REDBG='#fbe9e7';
  TEAL='#0f7c80'; INK='#16242b'; MUTE='#64777d'; LINE='#e2e8ea'; PANEL='#f7f9f9';

  // ---------- responsive ----------
  rp(){ const vw=this.state.vw||1200; return { vw, isMobile:vw<680, isTablet:vw>=680&&vw<1040, narrow:vw<1040, cardMode:vw<900 }; }

  // ---------- filtering ----------
  setTab(t){ this.setState({tab:t,page:0}); }
  setSort(k){ this.setState(s=>({ sortKey:k, sortDir: s.sortKey===k? -s.sortDir : 1, page:0 })); }
  setF(key,val){ this.setState(s=>({ f:Object.assign({},s.f,{[key]:val}), page:0 })); }
  toggleF(key,val){ this.setState(s=>({ f:Object.assign({},s.f,{[key]: s.f[key]===val?'':val}), page:0 })); }
  clearF(){ this.setState({ f:{q:'',prefix:'',vendor:'',wh:'',dept:'',person:'',from:'',to:''}, tab:'all', page:0 }); }
  activeCount(){ const f=this.state.f; return ['prefix','vendor','wh','dept','person','from','to','q'].filter(k=>f[k]).length; }

  scoped(except){
    const f=this.state.f; const fromN=this.inpNum(f.from), toN=this.inpNum(f.to);
    const qq=f.q.trim().toLowerCase();
    return this.D.rows.filter(r=>{
      if(except!=='prefix' && f.prefix && r.pf!==f.prefix) return false;
      if(except!=='vendor' && f.vendor && r.vn!==f.vendor) return false;
      if(except!=='wh' && f.wh && r.wh!==f.wh) return false;
      if(except!=='dept' && f.dept && r.dept!==f.dept) return false;
      if(except!=='person' && f.person && r.pn!==f.person) return false;
      if(fromN||toN){ const d=this.dnum(r.post); if(!d) return false; if(fromN&&d<fromN) return false; if(toN&&d>toN) return false; }
      if(qq){ const hay=(r.doc+' '+r.pf+' '+r.vn+' '+r.vc+' '+r.dept+' '+r.wh+' '+r.pn+' '+r.rm).toLowerCase();
        if(!hay.includes(qq)){ if(!(r.items||[]).some(it=>(it.desc+' '+it.no).toLowerCase().includes(qq))) return false; } }
      return true;
    });
  }
  derive(rows){
    let full=0,partial=0,aw=0,overdue=0,valAwait=0,totalValue=0,maxOd=0; const pm={};
    for(const r of rows){
      if(r.tr==='full') full++; else if(r.tr==='partial') partial++; else aw++;
      if(r.od){ overdue++; if((r.odDays||0)>maxOd) maxOd=r.odDays; } totalValue+=r.val;
      if(r.tr!=='full') valAwait += r.qty>0? r.val*(r.oq/r.qty):0;
      const k=this.ymOf(r.post); if(k) pm[k]=(pm[k]||0)+1;
    }
    return { totalPO:rows.length, totalValue, track:{full,partial,await:aw}, overdue, overdueMaxDays:maxOd, valAwait, poByMonth:pm };
  }
  ymOf(s){ if(!s) return null; const p=String(s).split('.'); if(p.length!==3) return null; return (2000+Number(p[2]))+'-'+p[1]; }
  breakdown(key,except,n){
    const rows=this.scoped(except); const m={};
    for(const r of rows){ const v=(key==='pf'?r.pf:key==='vn'?r.vn:key==='pn'?r.pn:r[key])||'(ไม่ระบุ)';
      const e=m[v]||(m[v]={k:v,count:0,open:0,val:0}); e.count++; e.val+=r.val; if(r.tr!=='full') e.open++; }
    return Object.values(m).sort((a,b)=>b.count-a.count).slice(0,n||999);
  }
  options(key){ if(!this._opt) this._opt={}; if(this._opt[key]) return this._opt[key];
    const m={}; for(const r of this.D.rows){ const v=(key==='pf'?r.pf:key==='vn'?r.vn:key==='pn'?r.pn:r[key]); if(v) m[v]=(m[v]||0)+1; }
    const arr=Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([k])=>k); this._opt[key]=arr; return arr;
  }

  // ---------- root ----------
  renderVals(){
    if(!this.state.ready) return { app:this.loading() };
    const h=React.createElement; const R=this.rp(); this.R=R;
    if(this.state.printOpen){ return { app: this.printReport() }; }
    const scope=this.scoped(); const M=this.derive(scope);
    this._scopedDocSet = new Set(scope.map(r=>r.doc));
    return { app: h('div',{style:{maxWidth:1340,margin:'0 auto',padding:R.isMobile?'0 12px 44px':'0 28px 64px'}},
      this.header(), this.filterBar(scope.length), this.kpis(M), this.pipeline(),
      this.attentionStrip(),
      this.charts(M), this.prefixSection(), this.peopleVendor(), this.tableSection(scope),
      this.state.sel!=null ? this.modal() : null,
      this.state.docList ? this.docListModal() : null,
      this.state.printOpen ? this.printReport() : null,
      this.state.upOpen ? this.uploadModal() : null,
      this.state.toast ? this.toastEl() : null
    )};
  }
  loading(){ const h=React.createElement;
    return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:18,color:this.MUTE}},
      h('div',{style:{width:38,height:38,borderRadius:'50%',border:'3px solid #d4dee0',borderTopColor:this.TEAL,animation:'spin .8s linear infinite'}}),
      h('div',{style:{fontSize:14}},'กำลังโหลดข้อมูลใบสั่งซื้อ…')); }
  card(children,extra){ return React.createElement('div',{style:Object.assign({background:'#fff',border:'1px solid '+this.LINE,borderRadius:14,boxShadow:'0 1px 2px rgba(20,40,50,.04)'},extra||{})}, children); }
  secTitle(t,right){ return React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,marginBottom:14,flexWrap:'wrap'}},
    React.createElement('div',{style:{fontSize:11.5,fontWeight:600,letterSpacing:1,color:this.MUTE,textTransform:'uppercase'}},t), right||null); }

  // ---------- header ----------
  header(){
    const h=React.createElement; const s=this.D.summary; const R=this.R;
    return h('div',{style:{display:'flex',alignItems:R.isMobile?'stretch':'flex-end',flexDirection:R.isMobile?'column':'row',justifyContent:'space-between',gap:R.isMobile?14:24,flexWrap:'wrap',padding:R.isMobile?'20px 0 14px':'30px 0 18px'}},
      h('div',null,
        h('div',{style:{display:'flex',alignItems:'center',gap:11,marginBottom:8}},
          h('div',{style:{width:34,height:34,borderRadius:9,background:this.TEAL,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:17,fontFamily:"'IBM Plex Mono',monospace"}},'PO'),
          h('div',{style:{fontSize:12,fontWeight:600,letterSpacing:1.5,color:this.TEAL,textTransform:'uppercase'}},'Purchase Order Tracking')),
        h('h1',{style:{margin:0,fontSize:R.isMobile?22:27,fontWeight:700,letterSpacing:-.3,lineHeight:1.15}},'ระบบติดตามสถานะใบสั่งซื้อ'),
        h('div',{style:{marginTop:6,fontSize:R.isMobile?12.5:13.5,color:this.MUTE}},'รพ.ธรรมศาสตร์เฉลิมพระเกียรติ · SAP B1 · PO ↔ รับของ ↔ ตั้งหนี้')),
      h('div',{style:{display:'flex',flexDirection:'column',alignItems:R.isMobile?'stretch':'flex-end',gap:10}},
        h('button',{onClick:()=>this.setState({upOpen:true}),
          style:{display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'11px 16px',background:this.TEAL,color:'#fff',border:'none',borderRadius:10,fontSize:13.5,fontWeight:600,cursor:'pointer',boxShadow:'0 1px 2px rgba(15,124,128,.3)'}},
          h('span',{style:{fontSize:15}},'↑'),'อัปโหลดข้อมูล PO / GR / Invoice'),
        this.cloudBadge(),
        h('div',{style:{textAlign:R.isMobile?'left':'right',fontSize:12,color:this.MUTE,lineHeight:1.6}},
          h('div',null,'ช่วงข้อมูล ',h('b',{style:{color:this.INK,fontFamily:"'IBM Plex Mono',monospace"}},s.dateMin),' – ',h('b',{style:{color:this.INK,fontFamily:"'IBM Plex Mono',monospace"}},s.dateMax)),
          h('div',null,'ปรับปรุง ',h('b',{style:{color:this.INK,fontFamily:"'IBM Plex Mono',monospace"}},s.generated)))));
  }

  // ---------- cloud badge ----------
  cloudBadge(){
    const h=React.createElement; const c=this.state.cloud||{state:'init'};
    const map={ init:{t:'กำลังเริ่มระบบ…',col:this.MUTE,bg:'#eef2f2',dot:'#b6c2c4'}, offline:{t:'โหมดออฟไลน์',col:this.MUTE,bg:'#eef2f2',dot:'#b6c2c4'},
      unconfigured:{t:'ยังไม่เชื่อม Firebase',col:this.TRACK.await.c,bg:this.TRACK.await.bg,dot:this.TRACK.await.c},
      loading:{t:'กำลังซิงค์ข้อมูล…',col:this.TEAL,bg:'#e3f1f2',dot:this.TEAL},
      connected:{t:'เชื่อมฐานข้อมูลกลาง',col:this.TRACK.full.c,bg:this.TRACK.full.bg,dot:this.TRACK.full.c},
      error:{t:'เชื่อม Firebase ไม่สำเร็จ',col:this.RED,bg:this.REDBG,dot:this.RED} };
    const m=map[c.state]||map.init; const meta=c.meta; let when=null;
    if(meta&&meta.updatedAtClient){ try{ when=new Date(meta.updatedAtClient).toLocaleString('th-TH',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(e){} }
    return h('div',{style:{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}},
      h('div',{style:{display:'inline-flex',alignItems:'center',gap:7,padding:'5px 11px',borderRadius:20,background:m.bg,color:m.col,fontSize:11.5,fontWeight:600}},
        c.state==='loading'? h('span',{style:{width:11,height:11,borderRadius:'50%',border:'2px solid '+this.TEAL,borderTopColor:'transparent',animation:'spin .8s linear infinite'}}) : h('span',{style:{width:7,height:7,borderRadius:'50%',background:m.dot}}),
        m.t, when? h('span',{style:{fontWeight:400,opacity:.85}},'· '+when):null, meta&&meta.note? h('span',{style:{fontWeight:400,opacity:.85}},'· '+meta.note):null),
      (c.state==='connected'||c.state==='error')? h('button',{onClick:()=>this.syncFromCloud(),title:'รีเฟรชจากฐานข้อมูล',
        style:{border:'1px solid '+this.LINE,background:'#fff',borderRadius:8,width:27,height:27,cursor:'pointer',color:this.MUTE,fontSize:13,lineHeight:1}},'⟳'):null);
  }

  // ---------- filter bar ----------
  ctrl(label,node,basis){ return React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:4,flex:basis||'0 0 auto',minWidth:0}},
    React.createElement('div',{style:{fontSize:10.5,fontWeight:600,color:this.MUTE,textTransform:'uppercase',letterSpacing:.4}},label), node); }
  select(key,opts,wide){ const h=React.createElement; const v=this.state.f[key]; const R=this.R;
    return h('select',{value:v,onChange:e=>this.setF(key,e.target.value),
      style:{padding:'8px 9px',border:'1px solid '+(v?this.TEAL:this.LINE),borderRadius:8,fontSize:12.5,color:v?this.INK:this.MUTE,background:v?'#f0f8f8':'#fff',width:R.isMobile?'100%':'auto',minWidth:R.isMobile?0:(wide?170:120),maxWidth:R.isMobile?'none':(wide?230:170),cursor:'pointer',outline:'none'}},
      [h('option',{key:'',value:''},'ทั้งหมด'), ...opts.map(o=>h('option',{key:o,value:o}, o.length>34?o.slice(0,33)+'…':o))]); }
  dateInput(key){ const h=React.createElement; const v=this.state.f[key];
    return h('input',{type:'date',value:v,onChange:e=>this.setF(key,e.target.value),
      style:{padding:'7px 9px',border:'1px solid '+(v?this.TEAL:this.LINE),borderRadius:8,fontSize:12.5,color:this.INK,background:v?'#f0f8f8':'#fff',outline:'none',width:this.R.isMobile?'100%':'auto'}}); }
  filterBar(count){
    const h=React.createElement; const f=this.state.f; const active=this.activeCount(); const R=this.R;
    const show = !R.isMobile || this.state.filterOpen;
    const basis = R.isMobile? '1 1 46%' : (R.isTablet? '1 1 30%' : '0 0 auto');
    const head = h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,marginBottom:show?12:0}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},
        h('div',{style:{fontSize:13,fontWeight:700,color:this.INK}},'ตัวกรองข้อมูล'),
        active? h('span',{style:{padding:'2px 9px',borderRadius:20,background:this.TEAL,color:'#fff',fontSize:11,fontWeight:600}},active+' ตัวกรอง'):null),
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        h('div',{style:{fontSize:11.5,color:this.MUTE}},'พบ ',h('b',{style:{color:this.INK,fontFamily:"'IBM Plex Mono',monospace"}},this.fmtN(count)),' ใบ'),
        active? h('button',{onClick:()=>this.clearF(),style:{padding:'5px 11px',border:'1px solid '+this.LINE,background:'#fff',borderRadius:8,fontSize:12,color:this.RED,cursor:'pointer',fontWeight:500}},'✕ ล้าง'):null,
        R.isMobile? h('button',{onClick:()=>this.setState(s=>({filterOpen:!s.filterOpen})),style:{padding:'6px 12px',border:'1px solid '+this.LINE,background:this.state.filterOpen?this.PANEL:'#fff',borderRadius:8,fontSize:12.5,color:this.INK,cursor:'pointer',fontWeight:500}}, this.state.filterOpen?'ซ่อน ▴':'แสดง ▾'):null));
    const controls = show? h('div',{style:{display:'flex',alignItems:'flex-end',gap:12,flexWrap:'wrap'}},
      h('div',{style:{display:'flex',flexDirection:'column',gap:4,flex:R.isMobile?'1 1 100%':'0 0 auto'}},
        h('div',{style:{fontSize:10.5,fontWeight:600,color:this.MUTE,textTransform:'uppercase',letterSpacing:.4}},'ค้นหา'),
        h('div',{style:{position:'relative'}},
          h('input',{value:f.q,onChange:e=>this.setF('q',e.target.value),placeholder:'PO / ผู้ขาย / สินค้า / หมายเหตุ',
            style:{width:R.isMobile?'100%':230,padding:'8px 11px 8px 28px',border:'1px solid '+(f.q?this.TEAL:this.LINE),borderRadius:8,fontSize:12.5,outline:'none',color:this.INK,background:f.q?'#f0f8f8':'#fff'}}),
          h('div',{style:{position:'absolute',left:9,top:8,color:this.MUTE,fontSize:13}},'⌕'))),
      this.ctrl('ชุดเอกสาร (Prefix)', this.select('prefix',this.options('pf')), basis),
      this.ctrl('ผู้ขาย', this.select('vendor',this.options('vn'),true), basis),
      this.ctrl('คลัง', this.select('wh',this.options('wh')), basis),
      this.ctrl('แผนก', this.select('dept',this.options('dept')), basis),
      this.ctrl('ผู้รับผิดชอบ', this.select('person',this.options('pn'),true), basis),
      this.ctrl('วันที่ตั้งแต่', this.dateInput('from'), basis),
      this.ctrl('ถึงวันที่', this.dateInput('to'), basis)
    ):null;
    return this.card(h('div',{style:{padding:R.isMobile?'13px 14px':'14px 16px'}}, head, controls),{marginBottom:14});
  }

  // ---------- KPIs ----------
  kpis(M){
    const h=React.createElement; const s=this.D.summary; const R=this.R;
    const items=[

  // ---------- cloud sync ----------
  async syncFromCloud(){
    let tries=0;
    while((!window.FBStore || !window.firebase) && tries<50){ await new Promise(r=>setTimeout(r,100)); tries++; }
    if(!window.FBStore){ this.setState({cloud:{state:'offline'}}); return; }
    if(!window.FBStore.isConfigured()){ this.setState({cloud:{state:'unconfigured'}}); return; }
    this.setState({cloud:{state:'loading'}});
    try{ const res=await window.FBStore.loadCurrent();
      if(res && res.data && res.data.rows && res.data.rows.length){ this.D=res.data; this.enrich(this.D); window.PODATA=res.data; this._opt=null; this.setState({cloud:{state:'connected',meta:res.meta}}); }
      else { this.setState({cloud:{state:'connected',meta:null}}); }
    }catch(e){ this.setState({cloud:{state:'error',err:e.message||String(e)}}); }
  }

  // ---------- excel export ----------
  exportExcel(){
    if(!window.XLSXWrite){ this.setState({toast:'ตัวส่งออก Excel ยังไม่พร้อม ลองใหม่อีกครั้ง'}); clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:''}),3000); return; }
    const rows=this.currentRows(); const TL={full:'รับครบแล้ว',partial:'รับบางส่วน',await:'รอรับของ'};
    const cols=[
      {header:'สถานะ',key:'status',width:12},{header:'เกินกำหนด (วัน)',key:'odDays',num:true,width:13},
      {header:'เลขที่ PO',key:'doc',width:14},{header:'ชุดเอกสาร',key:'pf',width:10},
      {header:'วันที่เอกสาร',key:'post',width:12},{header:'กำหนดส่ง',key:'deliv',width:12},
      {header:'รหัสผู้ขาย',key:'vc',width:12},{header:'ผู้ขาย',key:'vn',width:34},
      {header:'แผนก',key:'dept',width:12},{header:'คลัง',key:'wh',width:12},
      {header:'ผู้รับผิดชอบ',key:'pn',width:20},{header:'จำนวนรายการ',key:'ln',num:true,width:11},
      {header:'รับแล้ว (%)',key:'rp',num:true,width:10},{header:'จำนวนค้างรับ',key:'oq',num:true,width:12},
      {header:'มูลค่า (บาท)',key:'val',num:true,width:15},{header:'จำนวน GR',key:'gd',num:true,width:9},
      {header:'จำนวนใบตั้งหนี้',key:'ap',num:true,width:12},{header:'หมายเหตุ',key:'rm',width:30}
    ];
    const data=rows.map(r=>({ status:TL[r.tr]||r.tr, odDays:r.od?r.odDays:'', doc:r.doc, pf:r.pf,
      post:this.fdate(r.post), deliv:this.fdate(r.deliv), vc:r.vc, vn:r.vn, dept:r.dept, wh:r.wh,
      pn:r.pn, ln:r.ln, rp:r.rp, oq:r.oq, val:r.val, gd:r.gd, ap:r.ap, rm:r.rm }));
    try{
      const blob=window.XLSXWrite.build(cols, data, 'PO Tracking');
      const d=new Date(); const fn='PO_Tracking_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'.xlsx';
      window.XLSXWrite.download(blob, fn);
      this.setState({toast:'ส่งออก Excel '+this.fmtN(rows.length)+' รายการแล้ว'});
    }catch(e){ this.setState({toast:'ส่งออกไม่สำเร็จ: '+(e.message||e)}); }
    clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:''}),3800);
  }

          h('button',{onClick:()=>window.print(),style:{padding:'9px 18px',border:'none',borderRadius:9,background:this.TEAL,color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer'}},'🖨 พิมพ์ / บันทึก PDF'),
          h('button',{onClick:close,style:{padding:'9px 16px',border:'1px solid '+this.LINE,background:'#fff',borderRadius:9,fontSize:13,color:this.INK,cursor:'pointer'}},'ปิด'))),
      h('div',{style:{padding:'22px 26px',maxWidth:1180,margin:'0 auto',color:'#16242b'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16,borderBottom:'2px solid '+this.INK,paddingBottom:12,marginBottom:14}},
          h('div',null,
            h('div',{style:{fontSize:19,fontWeight:700}},'รายงานติดตามสถานะใบสั่งซื้อ'),
            h('div',{style:{fontSize:12.5,color:this.MUTE,marginTop:3}},'โรงพยาบาลธรรมศาสตร์เฉลิมพระเกียรติ · SAP Business One'),
            h('div',{style:{fontSize:12,color:this.MUTE,marginTop:2}},'มุมมอง: ',h('b',{style:{color:this.INK}},tabName), fchips.length? ' · '+fchips.join(' · ') : ' · ไม่มีตัวกรอง')),
          h('div',{style:{textAlign:'right',fontSize:11.5,color:this.MUTE,lineHeight:1.6}},

            h('div',null,'พิมพ์เมื่อ ',h('b',{style:{color:this.INK,fontFamily:"'IBM Plex Mono',monospace"}},new Date().toLocaleString('th-TH'))))),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:10,marginBottom:16}},
          kpi('ใบสั่งซื้อ (ในมุมมอง)',this.fmtN(M.totalPO)+' ใบ'),

          kpi('รับบางส่วน',this.fmtN(M.track.partial)+' ใบ',this.TRACK.partial.c),
          kpi('เกินกำหนดส่ง',this.fmtN(M.overdue)+' ใบ',this.RED),
          kpi('มูลค่าค้างรับ','฿'+this.fmtM(M.valAwait)+(M.valAwait>=1e6?' ลบ.':''),this.TRACK.await.c),
          kpi('มูลค่ารวม','฿'+this.fmtM(M.totalValue)+(M.totalValue>=1e6?' ลบ.':''))),
        h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:10.5}},
          h('thead',null, h('tr',null, th('#'),th('เลขที่ PO'),th('สถานะ'),th('วันที่เอกสาร'),th('กำหนดส่ง'),th('เกิน(วัน)','right'),th('ผู้ขาย'),th('แผนก/คลัง'),th('ผู้รับผิดชอบ'),th('รับแล้ว','right'),th('มูลค่า (฿)','right'),th('GR','right'),th('INV','right'))),
          h('tbody',null, show.map((r,i)=> h('tr',{key:r.doc,className:'pr-row'},
            td(i+1,'right',true), td(r.doc,'left',true), td(this.TRACK[r.tr].label,'left',false,this.TRACK[r.tr].c),
            td(this.fdate(r.post),'left',true), td(this.fdate(r.deliv),'left',true,r.od?this.RED:null),
            td(r.od?this.fmtN(r.odDays):'—','right',true,r.od?this.RED:'#9aa'),
            td(r.vn||'—'), td((r.dept||'—')+'/'+(r.wh||''),'left',true), td(r.pn||'—'),

        h('div',{style:{marginTop:14,fontSize:10.5,color:this.MUTE,display:'flex',justifyContent:'space-between'}},
          h('div',null,'รวม ',h('b',null,this.fmtN(show.length)),' รายการในรายงานนี้'),
          h('div',null,'ระบบติดตามสถานะใบสั่งซื้อ · สร้างจากข้อมูล SAP B1'))));
